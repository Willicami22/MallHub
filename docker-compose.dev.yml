services:
  postgres:
    image: postgres:17-alpine
    container_name: mallhub-postgres-dev
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-mallhub}"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
    tmpfs:
      - "${POSTGRES_TMPFS_PATH:-/var/lib/postgresql/data}:rw,size=${POSTGRES_TMPFS_SIZE:-512m}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-mallhub}",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  minio:
    image: quay.io/minio/minio:latest
    container_name: mallhub-minio-dev
    command: server /data --console-address ":${MINIO_CONSOLE_PORT:-9001}"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:${MINIO_CONSOLE_PORT:-9001}"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    tmpfs:
      - "${MINIO_TMPFS_PATH:-/data}:rw,size=${MINIO_TMPFS_SIZE:-256m}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
